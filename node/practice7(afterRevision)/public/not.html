<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing post requests</title>
</head>
<body>

        <button onclick="testPost()">Send POST</button>
    
    <script>
        async function testPost() {
            let a=await fetch("/",{method:"POST"})
            let b=await a.text();
            console.log("Response from server : ",b);
        }
    </script>
</body>
</html>
